<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | HuaDongQiFei</title>
  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <link rel="stylesheet" href="style.css?v=20260107">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { display: flex; align-items: center; justify-content: center; }

    #LoadingScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.8s ease-out;
    }

    #LoadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(76,175,80,0.5);
      letter-spacing: 3px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 30px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #ProgressBar {
      width: 70%;
      max-width: 280px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    #ProgressFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A, #CDDC39);
      border-radius: 4px;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 10px rgba(76,175,80,0.5);
    }

    #ProgressText {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin-top: 15px;
      letter-spacing: 1px;
    }

    #GameDiv, #Cocos3dGameContainer, #GameCanvas {
      width: 100vw !important;
      height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
    }
  </style>
</head>
<body>

<div id="LoadingScreen">
  <div class="logo">HuaDongQiFei</div>
  <div class="spinner"></div>
  <div id="ProgressBar"><div id="ProgressFill"></div></div>
  <div id="ProgressText">Initializing...</div>
</div>

<div id="GameDiv" cc_exact_fit_screen="true">
  <div id="Cocos3dGameContainer">
    <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
  </div>
</div>

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>
<script src="src/system.bundle.js" charset="utf-8"> </script>
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
(function() {
    var fill = document.getElementById('ProgressFill');
    var text = document.getElementById('ProgressText');
    var screen = document.getElementById('LoadingScreen');
    var progress = 0;

    function setProgress(p) {
        progress = Math.min(Math.max(p, 0), 100);
        fill.style.width = progress + '%';
        var msgs = ['Initializing...', 'Loading engine...', 'Loading assets...', 'Almost ready...', 'Starting game...'];
        var idx = Math.min(Math.floor(progress / 25), msgs.length - 1);
        text.textContent = msgs[idx] + ' ' + Math.floor(progress) + '%';
    }

    setProgress(5);

    var timer = setInterval(function() {
        if (progress < 85) {
            setProgress(progress + Math.random() * 6 + 1.5);
        }
    }, 350);

    System.import('./index.js').then(function(mod) {
        clearInterval(timer);

        var step = progress;
        var finish = setInterval(function() {
            step += 8;
            if (step >= 100) {
                step = 100;
                clearInterval(finish);
                setProgress(100);
                text.textContent = 'Ready!';

                setTimeout(function() {
                    screen.classList.add('hidden');
                    setTimeout(function() {
                        if (screen.parentNode) {
                            screen.parentNode.removeChild(screen);
                        }
                    }, 800);
                }, 400);
            } else {
                setProgress(step);
            }
        }, 50);
    }).catch(function(err) {
        clearInterval(timer);
        console.error(err);
        text.textContent = 'Load failed! Please refresh';
        text.style.color = '#ff5252';
    });
})();
</script>

</body>
</html>
