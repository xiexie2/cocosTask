<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>HuaDongQiFei - Playable Ad</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #ad-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 750px;
            max-height: 1334px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #fff;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loading-text {
            color: #fff;
            font-size: 18px;
            margin-top: 20px;
            font-weight: 300;
        }
        
        #cta-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #cta-button.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        #cta-button:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }
        
        #cta-button:active {
            transform: translateX(-50%) scale(0.98);
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            #cta-button {
                padding: 10px 30px;
                font-size: 16px;
                bottom: 15px;
            }
            
            #ad-container {
                max-height: 100vh;
            }
        }
        
        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="loading-screen">
            <div class="loader"></div>
            <div id="loading-text">Loading...</div>
        </div>
        
        <button id="cta-button" onclick="handleCTAClick()">Download Now</button>
    </div>

    <script type="text/javascript">
        // ============================================
        // MRAID Configuration & Initialization
        // ============================================
        
        const MRAID_CONFIG = {
            storeUrl: 'https://apps.apple.com/app/your-app-id',
            fallbackUrl: 'https://www.example.com',
            isMRAIDAvailable: typeof mraid !== 'undefined'
        };
        
        let isAdReady = false;
        let isViewable = false;
        let gameStarted = false;
        
        // ============================================
        // MRAID Event Handlers
        // ============================================
        
        function initMRAID() {
            if (!MRAID_CONFIG.isMRAIDAvailable) {
                console.log('MRAID not available, running in standalone mode');
                initGame();
                return;
            }
            
            console.log('MRAID initialized');
            
            // Check initial state
            const state = mraid.getState();
            console.log('Initial MRAID state:', state);
            
            if (state === 'loading') {
                mraid.addEventListener('ready', onMRAIDReady);
            } else if (state === 'default') {
                onMRAIDReady();
            }
            
            // Listen for viewability changes
            mraid.addEventListener('viewableChange', function(viewable) {
                isViewable = viewable;
                console.log('Viewable changed:', viewable);
                
                if (viewable && isAdReady && !gameStarted) {
                    startGame();
                }
            });
            
            // Listen for state changes
            mraid.addEventListener('stateChange', function(state) {
                console.log('State changed:', state);
            });
            
            // Listen for size changes
            mraid.addEventListener('sizeChange', function(width, height) {
                console.log('Size changed:', width, 'x', height);
                resizeCanvas();
            });
        }
        
        function onMRAIDReady() {
            console.log('MRAID ready');
            isAdReady = true;
            
            // Check if already viewable
            if (mraid.isViewable()) {
                isViewable = true;
            }
            
            initGame();
        }
        
        // ============================================
        // Game Loading & Initialization
        // ============================================
        
        let loadingProgress = 0;
        const loadingText = document.getElementById('loading-text');
        const loadingScreen = document.getElementById('loading-screen');
        const ctaButton = document.getElementById('cta-button');
        
        function updateLoadingProgress(progress) {
            loadingProgress = progress;
            loadingText.textContent = `Loading... ${Math.round(progress)}%`;
            
            if (progress >= 100) {
                setTimeout(() => {
                    hideLoadingScreen();
                    if (isViewable || !MRAID_CONFIG.isMRAIDAvailable) {
                        startGame();
                    } else {
                        showWaitingMessage();
                    }
                }, 500);
            }
        }
        
        function hideLoadingScreen() {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        }
        
        function showWaitingMessage() {
            loadingText.textContent = 'Tap to start';
            document.body.addEventListener('click', startGameOnce);
            document.body.addEventListener('touchstart', startGameOnce);
        }
        
        let startGameCalled = false;
        function startGameOnce(e) {
            if (startGameCalled) return;
            startGameCalled = true;
            startGame();
        }
        
        function initGame() {
            console.log('Initializing game...');
            
            // Simulate loading process
            simulateLoading();
        }
        
        function simulateLoading() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                }
                updateLoadingProgress(progress);
            }, 200);
        }
        
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            
            console.log('Starting game...');
            
            // Initialize canvas and game engine
            initCanvas();
            
            // Show CTA button after a delay (simulating gameplay completion)
            setTimeout(showCTAButton, 8000); // Show after 8 seconds of gameplay
        }
        
        // ============================================
        // Canvas & Game Engine Setup
        // ============================================
        
        const canvas = document.getElementById('game-canvas');
        let ctx = null;
        let animationId = null;
        
        function initCanvas() {
            ctx = canvas.getContext('2d');
            resizeCanvas();
            
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeCanvas, 100);
            });
            
            // Start game loop
            gameLoop();
        }
        
        function resizeCanvas() {
            const container = document.getElementById('ad-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            console.log('Canvas resized:', canvas.width, 'x', canvas.height);
        }
        
        // Simple demo game rendering
        let gameTime = 0;
        let particles = [];
        
        function createParticle(x, y) {
            return {
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                size: Math.random() * 5 + 2
            };
        }
        
        function gameLoop() {
            if (!ctx) return;
            
            gameTime += 0.016; // ~60fps
            
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw animated circles (simulating game characters)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const time = Date.now() / 1000;
            
            for (let i = 0; i < 5; i++) {
                const angle = (time + i * 0.5) % (Math.PI * 2);
                const radius = 80 + Math.sin(time * 2 + i) * 20;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                ctx.beginPath();
                ctx.arc(x, y, 20 + i * 5, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${i * 72}, 70%, 60%)`;
                ctx.fill();
                
                // Add glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${i * 72}, 70%, 60%)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Draw center character
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
            centerGradient.addColorStop(0, '#f093fb');
            centerGradient.addColorStop(1, '#f5576c');
            ctx.fillStyle = centerGradient;
            ctx.fill();
            
            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.size *= 0.98;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // Add particles occasionally
            if (Math.random() > 0.9) {
                particles.push(createParticle(
                    centerX + (Math.random() - 0.5) * 100,
                    centerY + (Math.random() - 0.5) * 100
                ));
            }
            
            // Draw "Swipe Up" instruction
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText('Swipe Up to Play!', centerX, canvas.height - 150);
            
            // Animated arrow
            const arrowY = canvas.height - 180 + Math.sin(time * 3) * 10;
            drawArrow(ctx, centerX, arrowY);
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function drawArrow(ctx, x, y) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 15, y + 20);
            ctx.lineTo(x - 5, y + 20);
            ctx.lineTo(x - 5, y + 35);
            ctx.lineTo(x + 5, y + 35);
            ctx.lineTo(x + 5, y + 20);
            ctx.lineTo(x + 15, y + 20);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fill();
        }
        
        // Touch/Mouse interaction
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            if (diff > 50) { // Swipe up detected
                handleSwipeUp();
            }
        });
        
        canvas.addEventListener('mousedown', () => { touchStartY = event.clientY; });
        canvas.addEventListener('mouseup', () => {
            const diff = touchStartY - event.clientY;
            if (diff > 50) handleSwipeUp();
        });
        
        function handleSwipeUp() {
            console.log('Swipe up detected!');
            
            // Create burst of particles
            for (let i = 0; i < 20; i++) {
                particles.push(createParticle(canvas.width / 2, canvas.height / 2));
            }
        }
        
        // ============================================
        // CTA Button Handling
        // ============================================
        
        function showCTAButton() {
            ctaButton.classList.add('visible');
        }
        
        function handleCTAClick() {
            console.log('CTA clicked');
            
            if (MRAID_CONFIG.isMRAIDAvailable && typeof mraid.open === 'function') {
                // Use MRAID to open the store URL
                mraid.open(MRAID_CONFIG.storeUrl);
            } else {
                // Fallback for non-MRAID environments
                window.open(MRAID_CONFIG.fallbackUrl, '_blank');
            }
        }
        
        // ============================================
        // Analytics Tracking (Optional)
        // ============================================
        
        function trackEvent(eventName, data) {
            console.log('Event tracked:', eventName, data);
            
            // Example analytics call (replace with your analytics service)
            /*
            fetch('https://your-analytics-endpoint.com/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event: eventName,
                    data: data,
                    timestamp: Date.now()
                })
            }).catch(err => console.error('Analytics error:', err));
            */
        }
        
        // Track key events
        trackEvent('ad_loaded', {});
        
        // ============================================
        // Initialize Everything
        // ============================================
        
        window.addEventListener('load', () => {
            console.log('Page loaded');
            initMRAID();
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            trackEvent('ad_closed', { duration: Date.now() });
        });
        
        // Prevent zoom on double tap (iOS)
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
